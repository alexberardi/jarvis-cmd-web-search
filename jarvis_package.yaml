name: "search_web"
display_name: "Web Search"
description: "Live web search for current/real-time information via Bing or DuckDuckGo. Use for news, stocks, elections, events, and anything that changes frequently."
version: "1.0.0"
min_jarvis_version: "0.9.0"
license: "MIT"
author:
  github: "alexberardi"
categories: ["information", "search"]
platforms: ["darwin", "linux"]
keywords: ["search", "web", "news", "current events", "lookup", "find"]

components:
  - type: command
    name: search_web
    path: commands/search_web/command.py

packages:
  - name: httpx
  - name: duckduckgo-search
  - name: pydantic

secrets:
  - key: LIVE_SEARCH_PROVIDER
    scope: integration
    value_type: string
    description: "Search provider: 'bing' or 'duckduckgo'"
    is_sensitive: false
  - key: LIVE_SEARCH_API_KEY
    scope: integration
    value_type: string
    description: "API key for the selected search provider (not needed for DuckDuckGo)"
    is_sensitive: true
  - key: LIVE_SEARCH_REGION
    scope: integration
    value_type: string
    description: "Search region/locale (e.g., 'en-US') — used by some providers"
    is_sensitive: false
